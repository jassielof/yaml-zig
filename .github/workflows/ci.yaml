name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Zig
        uses: jassielof/setup-zig@v1

      - name: Formatting
        run: zig fmt .

      - name: Build
        run: zig build --summary all

      - name: Docs
        run: zig build docs --summary all

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: zig-out/docs
  tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Zig
        uses: jassielof/setup-zig@v1

      - name: Tests
        run: zig build --summary all tests -Dsummary=true

      - name: Setup Python
        if: always()
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Render YAML spec coverage summary
        if: always()
        env:
          MATRIX_OS: ${{ matrix.os }}
        run: python scripts/render_coverage_summary.py

  pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: tests
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
